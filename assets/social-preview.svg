<?xml version="1.0" encoding="UTF-8"?>
<!-- GitHub social preview / OG image — 1280×640. Matrix-green aesthetic,
     brand tokens mirror docs/assets/tokens.css. Rasterize to PNG before use
     (GitHub's social-preview upload needs PNG/JPG); see assets/README.md. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="75%">
      <stop offset="0%" stop-color="#33ff66" stop-opacity="0.16"/>
      <stop offset="70%" stop-color="#000600" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33ff66" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#33ff66" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="#000600"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- faint fleet-grid motif (3×3 cards) top-right -->
  <g opacity="0.5" stroke="#0e3a22" stroke-width="1.5" fill="url(#fade)">
    <g transform="translate(760,86)">
      <rect x="0"   y="0"   width="140" height="120" rx="8"/>
      <rect x="160" y="0"   width="140" height="120" rx="8"/>
      <rect x="320" y="0"   width="140" height="120" rx="8"/>
      <rect x="0"   y="140" width="140" height="120" rx="8"/>
      <rect x="160" y="140" width="140" height="120" rx="8"/>
      <rect x="320" y="140" width="140" height="120" rx="8"/>
      <rect x="0"   y="280" width="140" height="120" rx="8"/>
      <rect x="160" y="280" width="140" height="120" rx="8"/>
      <rect x="320" y="280" width="140" height="120" rx="8"/>
    </g>
  </g>

  <!-- top prompt line -->
  <text x="80" y="120" font-size="22" fill="#149936">~/fleet · 10 agents · <tspan fill="#00ff66">⋔</tspan> fan-out</text>

  <!-- title -->
  <text x="78" y="228" font-size="76" font-weight="700" fill="#d6ffe0" letter-spacing="-1">BlueArch</text>
  <text x="78" y="316" font-size="76" font-weight="700" fill="#33ff66" letter-spacing="-1">Mission Control</text>

  <!-- tagline -->
  <text x="80" y="388" font-size="34" fill="#d6ffe0">Ten agents, one keyboard.</text>

  <!-- subline -->
  <text x="80" y="432" font-size="24" fill="#7ecb98">Keyboard-first terminal TUI for Claude Code agents.</text>

  <!-- chips — widths sized for monospace fallback (≈11.5px/char @19px) so
       runs don't collide; the US flag is drawn as vector (color emoji does
       not rasterize under resvg/librsvg). -->
  <g font-size="19" fill="#33ff66">
    <g>
      <rect x="80"  y="472" width="290" height="44" rx="22" fill="none" stroke="#0e3a22"/>
      <text x="102" y="500">Open source · AGPL-3.0</text>
    </g>
    <g>
      <rect x="386" y="472" width="164" height="44" rx="22" fill="none" stroke="#0e3a22"/>
      <text x="408" y="500">Self-hosted</text>
    </g>
    <g>
      <rect x="566" y="472" width="142" height="44" rx="22" fill="none" stroke="#0e3a22"/>
      <text x="588" y="500">⋔ fan-out</text>
    </g>
    <g>
      <rect x="724" y="472" width="250" height="44" rx="22" fill="none" stroke="#0e3a22"/>
      <text x="746" y="500">Made in the USA</text>
      <!-- vector US flag -->
      <g transform="translate(922,485)">
        <rect width="30" height="19" fill="#b22234"/>
        <rect y="2.7"  width="30" height="2.7" fill="#ffffff"/>
        <rect y="8.1"  width="30" height="2.7" fill="#ffffff"/>
        <rect y="13.5" width="30" height="2.7" fill="#ffffff"/>
        <rect width="13" height="10.8" fill="#3c3b6e"/>
      </g>
    </g>
  </g>

  <!-- npx line -->
  <text x="80" y="576" font-size="24" fill="#7ecb98"><tspan fill="#00ff66">$</tspan> npx @bluearch/mission-control</text>
</svg>
